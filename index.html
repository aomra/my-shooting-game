<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Mobile Shooting Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            color: white;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 750px;
            display: flex;
            flex-direction: column;
        }
        canvas {
            width: 100%;
            flex-grow: 1;
            background-color: #050510;
            border-bottom: 2px solid #00ffcc;
        }
        #controller {
            height: 160px;
            background-color: #151520;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
        }
        #joystickContainer {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 255, 200, 0.4);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #joystickKnob {
            width: 36px;
            height: 36px;
            background: #00ffcc;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 10px #00ffcc;
            pointer-events: none;
        }
        #shotButton {
            width: 80px;
            height: 80px;
            background: #ff3366;
            border: none;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 15px #ff3366;
            outline: none;
        }
        #shotButton:animated {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="450" height="550"></canvas>
    <div id="controller">
        <div id="joystickContainer">
            <div id="joystickKnob"></div>
        </div>
        <button id="shotButton">SHOT</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let score = 0;
let isGameOver = false;

const player = {
    x: canvas.width / 2,
    y: canvas.height - 60,
    size: 18,
    speed: 6, 
    color: "#00ffcc"
};

let bullets = [];
let enemies = [];
let spawnTimer = 0;
let shootTimer = 0;

let isShooting = false;
let joystickInput = { x: 0, y: 0 };

// --- PCマウス操作 ---
canvas.addEventListener("mousemove", (e) => {
    if (isGameOver) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    player.x = (e.clientX - rect.left) * scaleX;
    player.y = (e.clientY - rect.top) * scaleY;
    isShooting = true; 
});

// --- スマホタッチ操作（バーチャルスティック） ---
const joystickContainer = document.getElementById("joystickContainer");
const joystickKnob = document.getElementById("joystickKnob");

function handleJoystick(e) {
    e.preventDefault();
    if (isGameOver) return;
    
    const touch = e.touches[0];
    const rect = joystickContainer.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    let deltaX = touch.clientX - centerX;
    let deltaY = touch.clientY - centerY;
    const distance = Math.hypot(deltaX, deltaY);
    const maxRadius = rect.width / 2;

    if (distance > maxRadius) {
        deltaX = (deltaX / distance) * maxRadius;
        deltaY = (deltaY / distance) * maxRadius;
    }

    joystickKnob.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

    joystickInput.x = deltaX / maxRadius;
    joystickInput.y = deltaY / maxRadius;
}

joystickContainer.addEventListener("touchstart", handleJoystick, {passive: false});
joystickContainer.addEventListener("touchmove", handleJoystick, {passive: false});
joystickContainer.addEventListener("touchend", () => {
    joystickKnob.style.transform = "translate(0px, 0px)";
    joystickInput = { x: 0, y: 0 };
});

// --- スマホタッチ操作（攻撃ボタン） ---
const shotButton = document.getElementById("shotButton");
shotButton.addEventListener("touchstart", (e) => { 
    e.preventDefault(); 
    if (isGameOver) {
        resetGame();
    } else {
        isShooting = true; 
    }
}, {passive: false});

shotButton.addEventListener("touchend", (e) => {
    e.preventDefault();
    isShooting = false;
});

// ゲームオーバー時の復活タップ判定
window.addEventListener("click", () => { if (isGameOver) resetGame(); });

function fireWideShot() {
    shootTimer++;
    if (shootTimer >= 5) {
        const angles = [-4, -2, 0, 2, 4]; 
        angles.forEach(angleX => {
            bullets.push({
                x: player.x,
                y: player.y - player.size,
                vx: angleX,
                vy: -12,
                size: 4,
                color: "#ffff00"
            });
        });
        shootTimer = 0;
    }
}

function spawnEnemy() {
    spawnTimer++;
    if (spawnTimer > 15) {
        enemies.push({
            x: Math.random() * (canvas.width - 30) + 15,
            y: -20,
            speed: Math.random() * 2 + 2,
            size: 16,
            color: "#ff3366"
        });
        spawnTimer = 0;
    }
}

function resetGame() {
    score = 0;
    bullets = [];
    enemies = [];
    isGameOver = false;
    isShooting = false;
    joystickInput = { x: 0, y: 0 };
    joystickKnob.style.transform = "translate(0px, 0px)";
    loop();
}

// メインのロジック更新（名前を修正しました）
function update() {
    if (isGameOver) return;

    player.x += joystickInput.x * player.speed;
    player.y += joystickInput.y * player.speed;

    if (player.x < player.size) player.x = player.size;
    if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
    if (player.y < player.size) player.y = player.size;
    if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;

    if (isShooting) fireWideShot();

    spawnEnemy();

    bullets.forEach((b, index) => {
        b.x += b.vx;
        b.y += b.vy;
        if (b.y < 0 || b.x < 0 || b.x > canvas.width) bullets.splice(index, 1);
    });

    enemies.forEach((e, index) => {
        e.y += e.speed;
        if (e.y > canvas.height) {
            enemies.splice(index, 1);
            score = Math.max(0, score - 50);
        }
        if (Math.hypot(e.x - player.x, e.y - player.y) < e.size + player.size) {
            isGameOver = true;
        }
    });

    bullets.forEach((b, bIndex) => {
        enemies.forEach((e, eIndex) => {
            if (Math.hypot(b.x - e.x, b.y - e.y) < b.size + e.size) {
                enemies.splice(eIndex, 1);
                bullets.splice(bIndex, 1);
                score += 100;
            }
        });
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (isGameOver) {
        ctx.fillStyle = "white";
        ctx.font = "32px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
        ctx.font = "22px sans-serif";
        ctx.fillText(`最終スコア: ${score}`, canvas.width / 2, canvas.height / 2 + 50);
        ctx.fillStyle = "#00ffcc";
        ctx.fillText("SHOTボタンか画面をタップで復活", canvas.width / 2, canvas.height / 2 + 110);
        return;
    }

    // 自機
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - player.size);
    ctx.lineTo(player.x - player.size, player.y + player.size);
    ctx.lineTo(player.x, player.y + player.size / 2);
    ctx.lineTo(player.x + player.size, player.y + player.size);
    ctx.closePath();
    ctx.fill();

    // 弾
    bullets.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // 敵
    enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // スコア
    ctx.fillStyle = "#00ffcc";
    ctx.font = "bold 20px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(`SCORE: ${score}`, 20, 40);
}

function loop() {
    update();
    draw();
    if (!isGameOver) requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
