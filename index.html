<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Responsive Shooting Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            color: white;
            overflow: hidden;
            touch-action: none; /* スマホの無駄なスクロールやズームを禁止 */
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 750px;
            display: flex;
            flex-direction: column;
        }
        canvas {
            width: 100%;
            flex-grow: 1;
            background-color: #050510;
            border-bottom: 2px solid #00ffcc;
        }
        /* スマホ用コントローラーのレイアウト */
        #controller {
            height: 160px;
            background-color: #151520;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-sizing: border-box;
            position: relative;
        }
        /* バーチャルスティックの土台 */
        #joystickContainer {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 200, 0.4);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 動くスティック部分 */
        #joystickKnob {
            width: 40px;
            height: 40px;
            background: #00ffcc;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 10px #00ffcc;
        }
        /* 攻撃ボタン */
        #shotButton {
            width: 80px;
            height: 80px;
            background: #ff3366;
            border: none;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 0 15px #ff3366;
            outline: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #shotButton:active {
            background: #ff6699;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="450" height="550"></canvas>
    
    <div id="controller">
        <div id="joystickContainer">
            <div id="joystickKnob"></div>
        </div>
        <button id="shotButton">SHOT</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ゲーム状態
let score = 0;
let isGameOver = false;

// 自機の設定
const player = {
    x: canvas.width / 2,
    y: canvas.height - 60,
    size: 18,
    speed: 5, // スティック移動時の速度
    color: "#00ffcc"
};

// 配列管理
let bullets = [];
let enemies = [];
let spawnTimer = 0;
let shootTimer = 0;

// 操作フラグ
let isShooting = false;
let joystickInput = { x: 0, y: 0 }; // スティックの傾き具合（-1 から 1）

// --- PC用マウス操作の互換性維持 ---
canvas.addEventListener("mousemove", (e) => {
    if (isGameOver) return;
    const rect = canvas.getBoundingClientRect();
    // 画面サイズ比率を計算して正確な位置を割り出す
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    player.x = (e.clientX - rect.left) * scaleX;
    player.y = (e.clientY - rect.top) * scaleY;
    isShooting = true; // PC時は自動連射
});

// --- スマホ用バーチャルスティックの処理 ---
const joystickContainer = document.getElementById("joystickContainer");
const joystickKnob = document.getElementById("joystickKnob");

function handleJoystick(e) {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = joystickContainer.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    // 中心からの距離を計算
    let deltaX = touch.clientX - centerX;
    let deltaY = touch.clientY - centerY;
    const distance = Math.hypot(deltaX, deltaY);
    const maxRadius = rect.width / 2;

    // スティックがはみ出さないように制限
    if (distance > maxRadius) {
        deltaX = (deltaX / distance) * maxRadius;
        deltaY = (deltaY / distance) * maxRadius;
    }

    // つまみの位置を動かす
    joystickKnob.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

    // 自機の移動ベクトルに変換 (-1 〜 1 の範囲)
    joystickInput.x = deltaX / maxRadius;
    joystickInput.y = deltaY / maxRadius;
}

joystickContainer.addEventListener("touchstart", handleJoystick);
joystickContainer.addEventListener("touchmove", handleJoystick);
joystickContainer.addEventListener("touchend", () => {
    joystickKnob.style.transform = "translate(0px, 0px)";
    joystickInput = { x: 0, y: 0 }; // 指を離したら停止
});

// --- スマホ用攻撃ボタンの処理 ---
const shotButton = document.getElementById("shotButton");
shotButton.addEventListener("touchstart", (e) => { e.preventDefault(); isShooting = true; });
shotButton.addEventListener("touchend", () => isShooting = false);

// リスタート処理（画面クリック）
window.addEventListener("click", () => {
    if (isGameOver) resetGame();
});
window.addEventListener("touchstart", () => {
    if (isGameOver) resetGame();
});

// 5方向ショット生成
function fireWideShot() {
    shootTimer++;
    if (shootTimer >= 5) {
        const angles = [-4, -2, 0, 2, 4]; 
        angles.forEach(angleX => {
            bullets.push({
                x: player.x,
                y: player.y - player.size,
                vx: angleX,
                vy: -12,
                size: 4,
                color: "#ffff00"
            });
        });
        shootTimer = 0;
    }
}

// 敵の生成
function spawnEnemy() {
    spawnTimer++;
    if (spawnTimer > 15) {
        enemies.push({
            x: Math.random() * (canvas.width - 30) + 15,
            y: -20,
            speed: Math.random() * 2 + 2,
            size: 16,
            color: "#ff3366"
        });
        spawnTimer = 0;
    }
}

function resetGame() {
    score = 0;
    bullets = [];
    enemies = [];
    isGameOver = false;
    isShooting = false;
    joystickInput = { x: 0, y: 0 };
    joystickKnob.style.transform = "translate(0px, 0px)";
    loop();
}

// メメインロジック更新
function update() {
    if (isGameOver) return;

    // スティックの入力に合わせて自機を移動
    player.x += joystickInput.x * player.speed;
    player.y += joystickInput.y * player.speed;

    // 画面外はみ出し制限
    if (player.x < player.size) player.x = player.size;
    if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
    if (player.y < player.size) player.y = player.size;
    if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;

    // 攻撃フラグがONなら発射
    if (isShooting) fireWideShot();

    spawnEnemy();

    // 弾の移動
    bullets.forEach((b, index) => {
        b.x += b.vx;
        b.y += b.vy;
        if (b.y < 0 || b.x < 0 || b.x > canvas.width) bullets.splice(index, 1);
    });

    // 敵の移動と判定
    enemies.forEach((e, index) => {
        e.y += e.speed;
        if (e.y > canvas.height) {
            enemies.splice(index, 1);
            score = Math.max(0, score - 50);
        }
        // 衝突判定
        if (Math.hypot(e.x - player.x, e.y - player.y) < e.size + player.size) {
            isGameOver = true;
        }
    });

    // 衝突判定（弾 vs 敵）
    bullets.forEach((b, bIndex) => {
        enemies.forEach((e, eIndex) => {
            if (Math.hypot(b.x - e.x, b.y - e.y) < b.size + e.size) {
                enemies.splice(eIndex, 1);
                bullets.splice(bIndex, 1);
                score += 100;
            }
        });
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (isGameOver) {
        ctx.fillStyle = "white";
        ctx.font = "32px sans-serif";
        ctx.textAlign = "center";
        ctx
