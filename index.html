<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Safe Area Shooting Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            color: white;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px; /* PC閲覧用の最大幅制限 */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        canvas {
            width: 100%;
            height: 100%;
            background-color: #050510;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="450" height="800"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let score = 0;
let isGameOver = false;

const player = {
    x: canvas.width / 2,
    y: canvas.height - 100,
    size: 18,
    color: "#00ffcc"
};

let bullets = [];
let enemies = [];
let spawnTimer = 0;
let shootTimer = 0;

let isShooting = false;

// --- タッチ操作用の変数（相対移動用） ---
let touchStartX = 0;
let touchStartY = 0;
let playerStartX = 0;
let playerStartY = 0;
let isTouching = false;

// --- PCマウス操作 ---
canvas.addEventListener("mousemove", (e) => {
    if (isGameOver) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    player.x = (e.clientX - rect.left) * scaleX;
    player.y = (e.clientY - rect.top) * scaleY;
    isShooting = true; 
});

canvas.addEventListener("mouseleave", () => {
    isShooting = false;
});

// --- スマホタッチ操作（直感的なスライド＆オートショット） ---
window.addEventListener("touchstart", (e) => {
    if (isGameOver) {
        resetGame();
        return;
    }
    
    isTouching = true;
    isShooting = true; // 画面に触れている間はオートショット

    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    // タッチされた初期位置を記録
    touchStartX = (touch.clientX - rect.left) * scaleX;
    touchStartY = (touch.clientY - rect.top) * scaleY;
    
    // その時のプレイヤーの初期位置を記録
    playerStartX = player.x;
    playerStartY = player.y;
}, {passive: false});

window.addEventListener("touchmove", (e) => {
    if (!isTouching || isGameOver) return;
    e.preventDefault(); // 画面のスクロールやバウンスを防止
    
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    const currentX = (touch.clientX - rect.left) * scaleX;
    const currentY = (touch.clientY - rect.top) * scaleY;
    
    // 指が動いた「差分」を計算
    const dx = currentX - touchStartX;
    const dy = currentY - touchStartY;
    
    // 自機を指の移動量に合わせて相対的に動かす
    player.x = playerStartX + dx;
    player.y = playerStartY + dy;
}, {passive: false});

window.addEventListener("touchend", () => {
    isTouching = false;
    isShooting = false; // 指を離したらショットを停止
});

function fireWideShot() {
    shootTimer++;
    if (shootTimer >= 5) {
        const angles = [-4, -2, 0, 2, 4]; 
        angles.forEach(angleX => {
            bullets.push({
                x: player.x,
                y: player.y - player.size,
                vx: angleX,
                vy: -14, // 画面が縦に伸びたので弾速を少しアップ
                size: 4,
                color: "#ffff00"
            });
        });
        shootTimer = 0;
    }
}

function spawnEnemy() {
    spawnTimer++;
    if (spawnTimer > 12) { // 画面が広くなったので少し湧きを早く調整
        enemies.push({
            x: Math.random() * (canvas.width - 30) + 15,
            y: -20,
            speed: Math.random() * 3 + 3, // 敵のスピードも少し調整
            size: 16,
            color: "#ff3366"
        });
        spawnTimer = 0;
    }
}

function resetGame() {
    score = 0;
    bullets = [];
    enemies = [];
    isGameOver = false;
    isShooting = false;
    isTouching = false;
    player.x = canvas.width / 2;
    player.y = canvas.height - 100;
    loop();
}

function update() {
    if (isGameOver) return;

    // 画面外へのはみ出し制限（スライド操作でも機能します）
    if (player.x < player.size) player.x = player.size;
    if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
    if (player.y < player.size) player.y = player.size;
    if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;

    if (isShooting) fireWideShot();

    spawnEnemy();

    bullets.forEach((b, index) => {
        b.x += b.vx;
        b.y += b.vy;
        if (b.y < 0 || b.x < 0 || b.x > canvas.width) bullets.splice(index, 1);
    });

    enemies.forEach((e, index) => {
        e.y += e.speed;
        if (e.y > canvas.height) {
            enemies.splice(index, 1);
            score = Math.max(0, score - 50);
        }
        if (Math.hypot(e.x - player.x, e.y - player.y) < e.size + player.size) {
            isGameOver = true;
        }
    });

    bullets.forEach((b, bIndex) => {
        enemies.forEach((e, eIndex) => {
            if (Math.hypot(b.x - e.x, b.y - e.y) < b.size + e.size) {
                enemies.splice(eIndex, 1);
                bullets.splice(bIndex, 1);
                score += 100;
            }
        });
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (isGameOver) {
        ctx.fillStyle = "white";
        ctx.font = "32px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
        ctx.font = "22px sans-serif";
        ctx.fillText(`最終スコア: ${score}`, canvas.width / 2, canvas.height / 2 + 50);
        ctx.fillStyle = "#00ffcc";
        ctx.fillText("画面をタップで復活", canvas.width / 2, canvas.height / 2 + 110);
        return;
    }

    // 自機
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - player.size);
    ctx.lineTo(player.x - player.size, player.y + player.size);
    ctx.lineTo(player.x, player.y + player.size / 2);
    ctx.lineTo(player.x + player.size, player.y + player.size);
    ctx.closePath();
    ctx.fill();

    // 弾
    bullets.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // 敵
    enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // スコア
    ctx.fillStyle = "#00ffcc";
    ctx.font = "bold 20px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(`SCORE: ${score}`, 20, 40);
}

function loop() {
    update();
    draw();
    if (!isGameOver) requestAnimationFrame(
